<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sonar City</title>
<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    min-height: 100vh;
    padding: 10px;
    box-sizing: border-box;
}

#ui-container {
    width: 100%;
    max-width: 640px;
    background: #181818;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 0 20px rgba(0,255,204,.15);
    box-sizing: border-box;
}

h1 { 
    margin-top: 0; 
    color: #00ffcc; 
    font-size: 1.8rem;
    text-align: center;
}

p { 
    color: #aaa; 
    font-size: 0.95rem; 
    line-height: 1.4;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 1rem;
    transition: background 0.2s;
}

#start-btn {
    background: #00ffcc;
    color: black;
}

#start-btn:active {
    background: #00ccaa;
}

#guess-btn {
    background: #ff0055;
    color: white;
}

#guess-btn:active {
    background: #dd0044;
}

#radar-container {
    display: flex;
    justify-content: center;
    margin: 15px 0;
    width: 100%;
}

#radar {
    width: 100%;
    height: auto;
    max-height: 75vw;
    background: #131313;
    border-radius: 50%;
    border: 1px solid #222;
}

#log {
    margin-top: 15px;
    border-top: 1px solid #333;
    padding-top: 10px;
    max-height: 140px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 0.85rem;
}

.log-entry { margin-bottom: 6px; }
.log-entry span { color: #00ffcc; font-weight: bold; }

#guess-container {
    margin-top: 15px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.9rem;
    color: #ccc;
}

input {
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 12px;
    padding: 12px;
    background: #222;
    border: 1px solid #444;
    color: white;
    border-radius: 8px;
    font-size: 1rem;
    -webkit-appearance: none;
    text-transform: uppercase;
}

#result { 
    margin-top: 10px; 
    font-weight: bold; 
    text-align: center;
    font-size: 1.05rem;
}

#city-hint {
    text-align: center;
    font-size: 1.4rem;
    letter-spacing: 4px;
    margin-bottom: 12px;
    color: #00ffcc;
    font-weight: bold;
    min-height: 30px;
    text-transform: uppercase;
}    
</style>
</head>
<body>

<div id="ui-container">
    <h1>Sonar City</h1>
    <p>
    Press START to perform a full radar sweep.
    The radar will reveal the 5 nearest cities surrounding your hidden location.
    Use those clues to determine where you are.
    </p>


    <div id="radar-container">
        <svg id="radar" viewBox="0 0 600 600" width="600" height="600">
            <circle cx="300" cy="300" r="250" fill="none" stroke="#00ffcc" stroke-width="2"/>
            <circle cx="300" cy="300" r="5" fill="#00ffcc"/>
            <line id="sweep" x1="300" y1="300" x2="300" y2="50" stroke="#00ffcc" stroke-width="3"/>
            <g id="city-layer"></g>
        </svg>
    </div>

    <div id="log"></div>

    <div id="guess-container">
    <label>Guess the hidden city</label>

    <div id="city-hint"></div>
        <input id="guess-input" placeholder="Paris, Berlin, Tokyo...">
        <button id="guess-btn">Start</button>
        <div id="result"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script>
const pools = [
    { name:"Paris", center:[2.3522,48.8566] },
    { name:"Berlin", center:[13.4050,52.5200] },
    { name:"London", center:[-0.1276,51.5072] },
    { name:"Madrid", center:[-3.7038,40.4168] },
    { name:"Rome", center:[12.4964,41.9028] },
    { name:"New York", center:[-74.0060,40.7128] },
    { name:"Los Angeles", center:[-118.2437,34.0522] },
    { name:"Chicago", center:[-87.6298,41.8781] },
    { name:"San Francisco", center:[-122.4194,37.7749] },
    { name:"Miami", center:[-80.1918,25.7617] },
    { name:"Seattle", center:[-122.3321,47.6062] },
    { name:"Houston", center:[-95.3698,29.7604] },
    { name:"Tokyo", center:[139.6503,35.6762] },
    { name:"Beijing", center:[116.4074,39.9042] },
    { name:"Seoul", center:[126.9780,37.5665] },
    { name:"Bangkok", center:[100.5018,13.7563] },
    { name:"Sydney", center:[151.2093,-33.8688] },
    { name:"Cairo", center:[31.2357,30.0444] },
    { name:"Istanbul", center:[28.9784,41.0082] },
    { name:"Mexico City", center:[-99.1332,19.4326] },
    { name:"Toronto", center:[-79.3832,43.6532] },
    { name:"Sao Paulo", center:[-46.6333,-23.5505] }
];

let secretCity = null;
let secretLocation = null;
let citiesGeoJSON = null;
let gameOver = false; 
let gameStarted = false;    
let revealedLetters = [];    
const log = document.getElementById("log");

let activeRadarCities = [];

function initNewCity() {
    // Selects a brand new city and sets references without changing the 'pools' array data
    secretCity = pools[Math.floor(Math.random() * pools.length)];
    secretLocation = secretCity.center;
    revealedLetters = [];
    updateCityHint();
}

function isOverlapping(a, b) {
    const padding = 4;
    return !(
        a.x + a.w + padding < b.x ||
        a.x > b.x + b.w + padding ||
        a.y + a.h + padding < b.y ||
        a.y > b.y + b.h + padding
    );
}

async function loadCities(){
    const response = await fetch("https://mapsmania.github.io/geocoder/cities.json");
    const raw = await response.json();
    citiesGeoJSON = {
        type:"FeatureCollection",
        features: raw.map(city =>
            turf.point(
                [parseFloat(city.lng), parseFloat(city.lat)],
                {
                    name: city.name,
                    pop: parseInt(city.pop || 0)
                }
            )
        )
    };
}

function getLargestNearbyCities(center) {
    const origin = turf.point(center);
    
    const candidates = citiesGeoJSON.features
        .map(city => {
            let bearing = turf.bearing(origin, city);
            return {
                city,
                distance: turf.distance(origin, city, { units: "miles" }),
                bearing: (bearing + 360) % 360
            };
        })
        .filter(item => item.distance > 30 && item.distance <= 600)
        .sort((a, b) => b.city.properties.pop - a.city.properties.pop);

    const selected = [];
    const minAngleGap = 35; 

    for (const candidate of candidates) {
        if (selected.length >= 5) break;

        const isTooClose = selected.some(s => {
            let diff = Math.abs(s.bearing - candidate.bearing);
            let wrapDiff = 360 - diff;
            return Math.min(diff, wrapDiff) < minAngleGap;
        });

        if (!isTooClose) {
            selected.push(candidate);
        }
    }

    if (selected.length < 5) {
        for (const candidate of candidates) {
            if (selected.length >= 5) break;
            if (!selected.find(s => s.city.properties.name === candidate.city.properties.name)) {
                selected.push(candidate);
            }
        }
    }
    return selected;
}

function prepareRadarData(nearestCities) {
    const radarRadius = 175;
    const radarCenter = 300;
    const maxDistance = Math.max(...nearestCities.map(c => c.distance)) * 1.1;

    activeRadarCities = nearestCities.map(item => {
        const name = item.city.properties.name;
        const dist = item.distance;
        
        let bearing = turf.bearing(turf.point(secretLocation), item.city);
        bearing = (bearing + 360) % 360;

        const scaledRadius = Math.min(dist / maxDistance, 1) * radarRadius;
        const radians = bearing * Math.PI / 180;

        const dotX = radarCenter + Math.sin(radians) * scaledRadius;
        const dotY = radarCenter - Math.cos(radians) * scaledRadius;

        const labelText = `${name} (${Math.round(dist)} km)`;
        const labelW = labelText.length * 6.8; 
        const labelH = 14;

        return {
            name,
            distance: dist,
            trueBearing: bearing, 
            dotX,
            dotY,
            labelX: dotX + 8,
            labelY: dotY - 6,
            w: labelW,
            h: labelH,
            revealed: false
        };
    });

    for (let iteration = 0; iteration < 100; iteration++) {
        let moved = false;

        for (let i = 0; i < activeRadarCities.length; i++) {
            for (let j = i + 1; j < activeRadarCities.length; j++) {
                const a = activeRadarCities[i];
                const b = activeRadarCities[j];

                const boxA = { x: a.labelX, y: a.labelY - a.h, w: a.w, h: a.h };
                const boxB = { x: b.labelX, y: b.labelY - b.h, w: b.w, h: b.h };

                if (isOverlapping(boxA, boxB)) {
                    const dx = (a.labelX + a.w / 2) - (b.labelX + b.w / 2);
                    const dy = a.labelY - b.labelY;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;

                    const pushFactor = 3;
                    const stepX = (dx / len) * pushFactor;
                    const stepY = (dy / len) * pushFactor;

                    a.labelX += stepX;
                    a.labelY += stepY;
                    b.labelX -= stepX;
                    b.labelY -= stepY;

                    moved = true;
                }
            }
        }
        
        activeRadarCities.forEach(c => {
            if (c.labelX < 15) c.labelX = 15;
            if (c.labelX + c.w > 585) c.labelX = 585 - c.w;
            if (c.labelY < 25) c.labelY = 25;
            if (c.labelY > 585) c.labelY = 585;
        });

        if (!moved) break;
    }
}

function plotCity(cityData) {
    const layer = document.getElementById("city-layer");
    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

    const originalLabelX = cityData.dotX + 8;
    const originalLabelY = cityData.dotY - 6;
    const dx = cityData.labelX - originalLabelX;
    const dy = cityData.labelY - originalLabelY;
    const distMoved = Math.sqrt(dx * dx + dy * dy);

    if (distMoved > 8) {
        const pointer = document.createElementNS("http://www.w3.org/2000/svg", "line");
        pointer.setAttribute("x1", cityData.dotX);
        pointer.setAttribute("y1", cityData.dotY);
        pointer.setAttribute("x2", cityData.labelX);
        pointer.setAttribute("y2", cityData.labelY - 4);
        pointer.setAttribute("stroke", "rgba(0, 255, 204, 0.4)");
        pointer.setAttribute("stroke-width", "1");
        pointer.setAttribute("stroke-dasharray", "3,3");
        group.appendChild(pointer);
    }

    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", cityData.dotX);
    dot.setAttribute("cy", cityData.dotY);
    dot.setAttribute("r", 5);
    dot.setAttribute("fill", "#ff0055");

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", cityData.labelX);
    label.setAttribute("y", cityData.labelY);
    label.setAttribute("fill", "#ffffff");
    label.setAttribute("font-size", "12");
    label.setAttribute("font-weight", "500");
    label.setAttribute("style", "text-shadow: 2px 2px 2px #111, -2px -2px 2px #111;");
    label.textContent = `${cityData.name} (${Math.round(cityData.distance)} km)`;

    group.appendChild(dot);
    group.appendChild(label);
    layer.appendChild(group);
}

function updateCityHint(showAll = false) {
    if(!secretCity) return;
    
    const hint = secretCity.name
        .split("")
        .map((char, index) => {
            if (char === " ") return " ";

            if (showAll || revealedLetters.includes(index)) {
                // Highlighted change: forced to uppercase
                return char.toUpperCase();
            }

            return "_";
        })
        .join(" ");

    document.getElementById("city-hint").textContent = hint;
}

function revealRandomLetter() {
    const available = [];

    secretCity.name.split("").forEach((char, index) => {
        if (
            char !== " " &&
            !revealedLetters.includes(index)
        ) {
            available.push(index);
        }
    });

    if (available.length === 0) return;

    const randomIndex =
        available[Math.floor(Math.random() * available.length)];

    revealedLetters.push(randomIndex);
    updateCityHint();
}    
    
function resetGame() {
    gameOver = false;
    initNewCity(); // Correctly pick a fresh reference

    document.getElementById("city-layer").innerHTML = "";
    document.getElementById("log").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("guess-input").value = "";

    const btn = document.getElementById("guess-btn");

startRadarSweep();

gameStarted = true;
btn.textContent = "Submit Guess";
}    

function startRadarSweep(){
    if(!citiesGeoJSON) return;

    document.getElementById("city-layer").innerHTML = "";
    log.innerHTML = "";

    const nearestCities = getLargestNearbyCities(secretLocation);
    prepareRadarData(nearestCities);

    let angle = 0;
    const sweep = document.getElementById("sweep");

    const timer = setInterval(()=>{
        angle += 2;
        const radians = angle * Math.PI / 180;

        const x = 300 + Math.sin(radians) * 250;
        const y = 300 - Math.cos(radians) * 250;

        sweep.setAttribute("x2", x);
        sweep.setAttribute("y2", y);

        activeRadarCities.forEach(item => {
            if (item.revealed) return;

            if (Math.abs(item.trueBearing - angle) < 2) {
                item.revealed = true;
                plotCity(item);

                log.innerHTML = `
                    <div class="log-entry">
                        Revealed: <span>${item.name}</span> (${Math.round(item.distance)} km)
                    </div>
                ` + log.innerHTML;
            }
        });

        if(angle >= 360){
            clearInterval(timer);
            log.innerHTML = `
                <div class="log-entry">
                    Sweep Complete. 5 nearby cities detected.
                </div>
            ` + log.innerHTML;
        }
    }, 20);
}


document.getElementById("guess-btn").addEventListener("click", () => {

    const btn = document.getElementById("guess-btn");
    const result = document.getElementById("result");

    // Initial Start
    if (!gameStarted) {
        gameStarted = true;
        startRadarSweep();
        btn.textContent = "Submit Guess";
        return;
    }

    // Play Again state
    if (gameOver) {
        resetGame();
        return;
    }

    const guess = document.getElementById("guess-input")
        .value
        .trim()
        .toLowerCase();

    if (guess === secretCity.name.toLowerCase()) {

        updateCityHint(true);

        result.innerHTML =
            `🎉 Correct! You found ${secretCity.name}`;

        gameOver = true;
        btn.textContent = "Play Again";

    } else {

        revealRandomLetter();

        result.innerHTML =
            `❌ Incorrect! A new letter has been revealed.`;

        document.getElementById("guess-input").value = "";
    }
});
// Setup the initial city selection state clean when window finishes loading
window.addEventListener("load", () => {
    initNewCity();
    loadCities();
});
</script>
</body>
</html>
